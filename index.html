<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💰 Space Wallet - บันทึกเงิน</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ดวงดาวพื้นหลัง */
    canvas#starsCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* จุดกระพริบ tail */
    .blinking-tail {
      display: inline-block;
      animation: pulse-dot 1.2s infinite ease-in-out;
      color: #00f0ff;
      text-shadow: 0 0 8px #00f0ff;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      text-align: center;
      margin: 20px 0 30px;
      text-shadow: 0 0 15px #c084fc, 0 0 30px #7e22ce;
      letter-spacing: 2px;
    }

    .balance-cards {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 25px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s, box-shadow 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(192, 132, 252, 0.2);
    }

    .card-label {
      font-size: 1rem;
      font-weight: 500;
      color: #a1a1c2;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-balance {
      font-family: 'Orbitron', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-balance.negative {
      background: linear-gradient(135deg, #f87171, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .view-link {
      font-size: 0.9rem;
      color: #7e8cff;
      margin-top: 10px;
      display: inline-block;
      font-weight: 500;
    }

    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7e22ce, #2563eb);
      border: none;
      color: white;
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(126, 34, 206, 0.5);
      cursor: pointer;
      z-index: 10;
      transition: transform 0.2s;
    }

    .fab:hover {
      transform: scale(1.1);
    }

    /* หน้ารายการและเพิ่ม */
    .page {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .page.active {
      display: flex;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 20px 0;
    }

    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      font-size: 1.5rem;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .transaction-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 20px;
    }

    .tx-item {
      background: rgba(30, 30, 60, 0.6);
      border-radius: 16px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid;
    }

    .tx-item.income {
      border-color: #4ade80;
    }
    .tx-item.expense {
      border-color: #f87171;
    }

    .tx-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tx-date {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .tx-desc {
      font-weight: 600;
    }
    .tx-amount {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
    }
    .tx-amount.income { color: #4ade80; }
    .tx-amount.expense { color: #f87171; }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 1.3rem;
      cursor: pointer;
      opacity: 0.7;
    }

    /* ฟอร์ม */
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 500;
      margin-bottom: 8px;
      color: #cbd5e1;
    }
    input, select, button {
      font-family: 'Space Grotesk', sans-serif;
    }
    input, select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    input:focus, select:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 10px #7e22ce;
    }
    .radio-group {
      display: flex;
      gap: 20px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7e22ce, #2563eb);
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-weight: 700;
      font-size: 1.1rem;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 20px #7e22ceaa;
      margin-top: 10px;
    }

    .balance-display {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 10px 0;
      color: #e2e8f0;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b4b;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      z-index: 20;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>
  <div class="app-container" id="appContainer">
    <!-- หน้าหลัก -->
    <div id="homePage" class="page active">
      <h1>SPACE WALLET<span class="blinking-tail">⬤</span></h1>
      <div class="balance-cards" id="balanceCards"></div>
      <div style="text-align:center; color:#94a3b8; font-size:0.9rem;">แตะการ์ดเพื่อดูรายการ</div>
    </div>

    <!-- หน้ารายการย้อนหลัง -->
    <div id="transactionsPage" class="page">
      <div class="page-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>
          <div id="txFundName" style="font-weight:700; font-size:1.3rem;"></div>
          <div id="txBalance" class="balance-display"></div>
        </div>
      </div>
      <div class="transaction-list" id="txList"></div>
    </div>

    <!-- หน้าเพิ่มรายการ -->
    <div id="addPage" class="page">
      <div class="page-header">
        <button class="back-btn" onclick="goHome()">←</button>
        <h2 style="font-size:1.5rem;">➕ เพิ่มรายการ</h2>
      </div>
      <div class="form-group">
        <label>เลือกกอง</label>
        <select id="addFund">
          <option value="ค่าเทอมลูก">🎒 ค่าเทอมลูก</option>
          <option value="เงินคงเหลือ">🏦 เงินคงเหลือ</option>
        </select>
      </div>
      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="addDate">
      </div>
      <div class="form-group">
        <label>รายการ</label>
        <input type="text" id="addDesc" placeholder="รายละเอียด...">
      </div>
      <div class="form-group">
        <label>จำนวนเงิน</label>
        <input type="number" id="addAmount" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>ประเภท</label>
        <div class="radio-group">
          <label><input type="radio" name="addType" value="รายรับ" checked> รายรับ</label>
          <label><input type="radio" name="addType" value="รายจ่าย"> รายจ่าย</label>
        </div>
      </div>
      <button class="btn-primary" onclick="submitTransaction()">💾 บันทึก</button>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" onclick="showAddPage()">+</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ⚙️ เปลี่ยน URL นี้เป็น Web App URL ที่ได้จาก GAS Deploy
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbww2R1YSGQpP_JQOkUIolrKePqYl3hsmQ3uBoqMRdXEyFvmGvauKDsHMnUiBGKJYyCy/exec';

    let currentFund = 'ค่าเทอมลูก';
    let currentPage = 'home';

    // ----- Canvas Stars Background -----
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    function createStars(count = 200) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 1.8 + 0.5,
          alpha: Math.random(),
          delta: Math.random() * 0.02 + 0.005
        });
      }
    }
    createStars();
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
        s.alpha += s.delta;
        if (s.alpha > 1 || s.alpha < 0.2) s.delta *= -1;
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    // ----- UI Helpers -----
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 2500);
    }

    function formatMoney(amount) {
      return Number(amount).toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function switchPage(pageName) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageName + 'Page').classList.add('active');
      currentPage = pageName;
    }

    function goHome() {
      switchPage('home');
      loadBalances();
    }

    function showAddPage() {
      document.getElementById('addDate').valueAsDate = new Date();
      document.getElementById('addDesc').value = '';
      document.getElementById('addAmount').value = '';
      document.querySelector('input[name="addType"][value="รายรับ"]').checked = true;
      switchPage('add');
    }

    // ----- API Calls -----
    async function apiCall(action, params = {}) {
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action, ...params }),
          headers: { 'Content-Type': 'application/json' }
        });
        return await res.json();
      } catch (err) {
        showToast('⚠️ เชื่อมต่อไม่ได้');
        return { success: false };
      }
    }

    async function loadBalances() {
      const data = await apiCall('getBalance');
      if (data.success) {
        renderBalanceCards(data.balances);
      }
    }

    function renderBalanceCards(balances) {
      const container = document.getElementById('balanceCards');
      const funds = [
        { key: 'ค่าเทอมลูก', icon: '🎒', name: 'ค่าเทอมลูก' },
        { key: 'เงินคงเหลือ', icon: '🏦', name: 'เงินคงเหลือ' }
      ];
      container.innerHTML = funds.map(f => {
        const bal = balances[f.key] || 0;
        const balClass = bal < 0 ? 'negative' : '';
        return `
          <div class="card" onclick="openTransactions('${f.key}')">
            <div class="card-label">${f.icon} ${f.name}</div>
            <div class="card-balance ${balClass}">${formatMoney(bal)} บาท</div>
            <span class="view-link">ดูรายการ →</span>
          </div>
        `;
      }).join('');
    }

    async function openTransactions(fund) {
      currentFund = fund;
      document.getElementById('txFundName').textContent = '📋 ' + fund;
      const data = await apiCall('getTransactions', { fund });
      if (data.success) {
        document.getElementById('txBalance').innerHTML = `ยอดคงเหลือ <strong style="color:#c084fc">${formatMoney(data.balance)}</strong> บาท`;
        renderTransactions(data.transactions);
        switchPage('transactions');
      } else {
        showToast('โหลดรายการไม่สำเร็จ');
      }
    }

    function renderTransactions(transactions) {
      const list = document.getElementById('txList');
      if (!transactions || transactions.length === 0) {
        list.innerHTML = '<div style="text-align:center; color:#64748b; padding:30px;">ยังไม่มีรายการ</div>';
        return;
      }
      list.innerHTML = transactions.map(tx => {
        const typeClass = tx.type === 'รายรับ' ? 'income' : 'expense';
        const sign = tx.type === 'รายรับ' ? '+' : '-';
        return `
          <div class="tx-item ${typeClass}">
            <div class="tx-info">
              <span class="tx-date">${tx.date}</span>
              <span class="tx-desc">${tx.description}</span>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <span class="tx-amount ${typeClass}">${sign} ${formatMoney(tx.amount)}</span>
              <button class="delete-btn" onclick="deleteTx(${tx.row}, '${tx.type}')">🗑</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function deleteTx(row, type) {
      if (!confirm('ลบรายการนี้?')) return;
      const data = await apiCall('deleteTransaction', { fund: currentFund, row });
      if (data.success) {
        showToast('ลบแล้ว');
        openTransactions(currentFund); // รีเฟรช
      } else {
        showToast('ลบไม่สำเร็จ');
      }
    }

    async function submitTransaction() {
      const fund = document.getElementById('addFund').value;
      const date = document.getElementById('addDate').value;
      const desc = document.getElementById('addDesc').value.trim();
      const amount = document.getElementById('addAmount').value;
      const type = document.querySelector('input[name="addType"]:checked').value;
      if (!date || !desc || !amount) {
        showToast('กรุณากรอกให้ครบ');
        return;
      }
      const data = await apiCall('addTransaction', { fund, date, description: desc, amount: Number(amount), type });
      if (data.success) {
        showToast('✅ บันทึกสำเร็จ');
        goHome();
      } else {
        showToast('❌ บันทึกไม่สำเร็จ');
      }
    }

    // เริ่มต้น
    loadBalances();
  </script>
</body>
</html>
